format:
  name: tex
  reader:
    kind: plain_text
    encoding: utf-8
  root_entity: section

entities:
  section:
    contains: subsection_scope
    segmenter:
      kind: match
      pattern: '\\section\{.*?(?=\\section\{|\Z)'
      trim: true
      drop_empty: true
      flags:
        - DOTALL

  subsection_scope:
    contains: content_scope
    segmenter:
      kind: match
      pattern: '(?:\A.*?(?=\\subsection\{|\Z)|\\subsection\{.*?(?=(?:\\subsection\{|\Z)))'
      trim: true
      drop_empty: true
      flags:
        - DOTALL

  content_scope:
    contains: semantic_block
    segmenter:
      kind: latex_content_scope
      trim: true
      drop_empty: true

  semantic_block:
    segmenter:
      kind: latex_semantic_block
      trim: true
      drop_empty: true
